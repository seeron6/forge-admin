<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>forge-admin · preview</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"/>
<style>
  :root {
    --bg: #0a0a0a; --bg-1: #111; --bg-2: #161616; --line: #242424; --line-2: #2e2e2e;
    --ink: #f5f5f4; --ink-2: #d4d4d4; --ink-3: #a3a3a3; --ink-4: #737373;
    --forge: #ff6b1f; --acid: #b6ff3d; --steel: #6ea8ff; --ember: #ffb547; --rust: #c44a2a;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink);
    font-family: 'Geist', system-ui, sans-serif; font-size: 13.5px; line-height: 1.5; height: 100%; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; padding: 0; }
  .frame { display: grid; grid-template-rows: 36px 1fr; height: 100%; }
  .titlebar { display: flex; align-items: center; gap: 8px; padding: 0 14px;
    border-bottom: 1px solid var(--line); background: var(--bg-1);
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-4); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #3a3a3a; }
  .dot.live { background: var(--forge); animation: pulse 1.6s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }
  .panel { padding: 18px 22px; overflow: auto; }
  .badge { display: inline-flex; align-items: center; gap: 5px;
    font-family: 'JetBrains Mono', monospace; font-size: 10.5px; padding: 2px 6px;
    border-radius: 4px; border: 1px solid var(--line-2); background: var(--bg-1); color: var(--ink-2); }
  .badge-acid { color: var(--acid); border-color: rgba(182,255,61,.3); background: rgba(182,255,61,.08); }
  .badge-rust { color: #e57b5f; border-color: rgba(196,74,42,.4); background: rgba(196,74,42,.08); }
  .badge-steel { color: var(--steel); border-color: rgba(110,168,255,.3); background: rgba(110,168,255,.08); }
  .btn { display: inline-flex; align-items: center; gap: 6px;
    font-family: 'JetBrains Mono', monospace; font-size: 12px; padding: 6px 11px;
    border: 1px solid var(--line-2); background: var(--bg-1); border-radius: 6px; color: var(--ink); }
  .btn:hover { background: var(--bg-2); border-color: #3a3a3a; }
  .btn-primary { background: var(--forge); border-color: var(--forge); color: #0a0a0a; font-weight: 500; }
  .btn-primary:hover { background: #ff8a3d; }
  .row { display: grid; grid-template-columns: auto 1fr auto; gap: 10px; align-items: center;
    padding: 10px 14px; border-top: 1px solid var(--line); }
  .row:first-child { border-top: 0; }
  .eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--ink-3); }
  input[type="text"], input[type="email"], input[type="search"], select, textarea {
    background: var(--bg-2); border: 1px solid var(--line-2); border-radius: 6px;
    color: var(--ink); padding: 7px 10px; font: inherit; outline: 0;
    font-family: 'JetBrains Mono', monospace; font-size: 12.5px;
  }
  input:focus { border-color: var(--forge); }
</style>
</head>
<body>
<div class="frame">
  <div class="titlebar">
    <span class="dot live"></span>
    <span>forge-admin</span>
    <span style="margin-left:auto">role: <span style="color:var(--ink-2)" id="role">admin</span></span>
  </div>
  <div class="panel" style="padding:0">
    <div style="display:grid;grid-template-columns:auto 1fr;gap:14px;padding:14px 18px;border-bottom:1px solid var(--line)">
      <select id="rolesel">
        <option value="admin">admin</option>
        <option value="editor">editor</option>
        <option value="viewer">viewer</option>
      </select>
      <input type="search" id="q" placeholder="search · email, plan, status…"/>
    </div>
    <table id="t" style="width:100%;border-collapse:collapse;font-size:12.5px">
      <thead>
        <tr style="background:var(--bg-2);border-bottom:1px solid var(--line)">
          <th style="text-align:left;padding:9px 14px;font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.08em">user</th>
          <th style="text-align:left;padding:9px 14px;font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.08em">email</th>
          <th style="text-align:left;padding:9px 14px;font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.08em">plan</th>
          <th style="text-align:left;padding:9px 14px;font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.08em">status</th>
          <th></th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>
<script>
  const data = [
    { user:'Acme Corp',     email:'ops@acme.com',          plan:'team',       status:'active' },
    { user:'Northwind',     email:'admin@northwind.io',    plan:'enterprise', status:'active' },
    { user:'Initech',       email:'billing@initech.dev',   plan:'free',       status:'past_due' },
    { user:'Globex',        email:'platform@globex.org',   plan:'team',       status:'active' },
    { user:'Umbrella',      email:'sec@umbrella.co',       plan:'enterprise', status:'paused' },
    { user:'Stripe-clone',  email:'finance@stripe-c.dev',  plan:'team',       status:'active' },
  ];
  function maskEmail(e){return e.replace(/^(.).+(@.+)$/,'$1•••$2');}
  const role = document.getElementById('rolesel'), q = document.getElementById('q'), tb = document.querySelector('#t tbody'), tag = document.getElementById('role');
  function render(){
    tag.textContent = role.value;
    const term = q.value.toLowerCase();
    tb.innerHTML = data
      .filter(r => (r.user+r.email+r.plan+r.status).toLowerCase().includes(term))
      .map(r => {
        const email = role.value === 'viewer' ? maskEmail(r.email) : r.email;
        const canEdit = role.value !== 'viewer';
        const statusColor = r.status==='active'?'var(--acid)':r.status==='past_due'?'#e57b5f':'var(--ember)';
        return `<tr style="border-top:1px solid var(--line)">
          <td style="padding:9px 14px">${r.user}</td>
          <td style="padding:9px 14px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-2)">${email}</td>
          <td style="padding:9px 14px"><span class="badge">${r.plan}</span></td>
          <td style="padding:9px 14px;color:${statusColor};font-family:'JetBrains Mono',monospace;font-size:12px">${r.status}</td>
          <td style="padding:9px 14px;text-align:right">${canEdit?'<button class="btn">edit</button>':'<span style="color:var(--ink-5);font-size:11px">read-only</span>'}</td>
        </tr>`;
      }).join('');
  }
  role.addEventListener('change', render);
  q.addEventListener('input', render);
  render();
</script>
</body></html>
